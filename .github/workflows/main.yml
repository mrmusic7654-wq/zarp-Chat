name: Build vidma APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 9.3.1

      - name: Fix signing config
        run: |
          sed -i '/signingConfigs {/,/^  }/d' app/build.gradle.kts
          sed -i 's/signingConfig = signingConfigs.getByName("release")//' app/build.gradle.kts
          sed -i 's/signingConfig = signingConfigs.getByName("debugConfig")//' app/build.gradle.kts

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vidma
          path: app/build/outputs/apk/debug/app-debug.apk
